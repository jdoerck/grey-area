<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>binary2marain</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    p.subtitle {
      color: #888;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    .card {
      width: 100%;
      max-width: 640px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: #111;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.75rem;
      font-size: 1rem;
      resize: vertical;
    }

    textarea:focus { outline: none; border-color: #666; }

    .file-drop {
      border: 1px dashed #444;
      border-radius: 4px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .file-drop:hover, .file-drop.drag-over {
      border-color: #888;
      color: #ccc;
    }

    .file-drop input[type="file"] { display: none; }

    .file-drop span.filename {
      color: #eee;
      font-style: normal;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
    }

    button {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    #generateBtn {
      background: #eee;
      color: #111;
      font-weight: 600;
    }

    #generateBtn:hover { background: #fff; }

    #downloadBtn, #downloadGifBtn {
      background: #333;
      color: #eee;
      display: none;
    }

    #downloadBtn:hover, #downloadGifBtn:hover { background: #444; }

    #preview {
      display: none;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: auto;
      background: #fff;
      padding: 0.5rem;
    }

    #preview svg { display: block; max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>text2marain</h1>
  <p class="subtitle">Convert text to a Marain-style binary SVG</p>

  <div class="card">
    <textarea id="input" placeholder="Enter text to encode…"></textarea>

    <label class="file-drop" id="fileDrop">
      <input type="file" id="fileInput" accept=".txt,.md,text/plain,text/markdown">
      <span id="fileLabel">Or drop a .txt / .md file here / click to browse</span>
    </label>

    <div class="actions">
      <button id="generateBtn">Generate</button>
      <button id="downloadBtn">Download SVG</button>
      <button id="downloadGifBtn">Download GIF</button>
    </div>
    <div id="preview"></div>
  </div>

  <script type="module">
    import { buildSvg } from '../src/core.js';
    import { svgToGIF } from '../src/gif.js';

    const input          = document.getElementById('input');
    const generateBtn    = document.getElementById('generateBtn');
    const downloadBtn    = document.getElementById('downloadBtn');
    const downloadGifBtn = document.getElementById('downloadGifBtn');
    const preview        = document.getElementById('preview');
    const fileInput   = document.getElementById('fileInput');
    const fileDrop    = document.getElementById('fileDrop');
    const fileLabel   = document.getElementById('fileLabel');

    let currentSvg = '';

    function loadFile(file) {
      if (!file) return;
      const allowed = ['text/plain', 'text/markdown'];
      const extAllowed = file.name.endsWith('.txt') || file.name.endsWith('.md');
      if (!allowed.includes(file.type) && !extAllowed) return;
      const reader = new FileReader();
      reader.onload = e => {
        input.value = e.target.result;
        fileLabel.innerHTML = `<span class="filename">${file.name}</span>`;
      };
      reader.readAsText(file);
    }

    fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

    fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
    fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('drag-over'));
    fileDrop.addEventListener('drop', e => {
      e.preventDefault();
      fileDrop.classList.remove('drag-over');
      loadFile(e.dataTransfer.files[0]);
    });

    generateBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;

      currentSvg = buildSvg(text);
      preview.innerHTML = currentSvg;
      preview.style.display = 'block';
      downloadBtn.style.display = 'inline-block';
      downloadGifBtn.style.display = 'inline-block';
    });

    downloadGifBtn.addEventListener('click', async () => {
      const gifBytes = await svgToGIF(currentSvg);
      const url = URL.createObjectURL(new Blob([gifBytes], { type: 'image/gif' }));
      const a = Object.assign(document.createElement('a'), {
        href: url,
        download: `marain-${Date.now()}.gif`,
      });
      a.click();
      URL.revokeObjectURL(url);
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([currentSvg], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url,
        download: `marain-${Date.now()}.svg`,
      });
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
